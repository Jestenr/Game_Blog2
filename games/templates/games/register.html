{% extends 'games/base.html' %}

{% block content %}

<div class="card">

    <h2>Регистрация</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Логин"
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
        >

        <button type="submit">

            Зарегистрироваться

        </button>

    </form>

</div>

{% endblock %}
